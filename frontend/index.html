<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxDesk - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #error-msg { color: red; font-size: 14px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>FluxDesk</h2>
        <p>Acesse sua conta</p>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Seu e-mail" required>
            <input type="password" id="password" placeholder="Sua senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p id="error-msg">E-mail ou senha incorretos!</p>
    </div>

    <script>
        // Intercepta o clique no botão de submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que a página recarregue

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // O FastAPI (OAuth2) exige que os dados de login sejam enviados neste formato específico:
            const formData = new URLSearchParams();
            formData.append('username', email); // O FastAPI chama o e-mail de 'username' por padrão
            formData.append('password', password);

            try {
                // Chama a NOSSA API lá no backend
                const response = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    // Salva o "crachá" (Token) no navegador
                    localStorage.setItem('fluxdesk_token', data.access_token);
                    
                    // Redireciona para a tela do Dashboard (que vamos criar a seguir)
                    alert("Login com sucesso! (Aqui iremos para o Dashboard)");
                    window.location.href = 'dashboard.html'; 
                } else {
                    errorMsg.style.display = 'block'; // Mostra mensagem de erro
                }
            } catch (error) {
                console.error('Erro ao conectar com a API:', error);
                alert("Erro ao conectar com o servidor.");
            }
        });
    </script>

</body>
</html>
